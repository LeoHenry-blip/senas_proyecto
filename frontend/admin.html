<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Señas V2 — Panel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }

    .admin-shell {
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 220px 1fr;
      height: 100vh;
    }

    /* NAVBAR — fila completa */
    .navbar {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: .75rem;
      background: var(--bg-800);
      border-bottom: 1px solid var(--border);
      z-index: 50;
    }
    .navbar-brand { font-weight: 700; font-size: .95rem; flex: 1; }
    .navbar-nav   { display: flex; align-items: center; gap: .5rem; }

    /* SIDEBAR */
    .admin-sidebar {
      grid-column: 1;
      grid-row: 2;
      background: var(--bg-800);
      border-right: 1px solid var(--border);
      padding: 1rem .75rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .55rem .75rem;
      border-radius: var(--radius-md);
      font-size: .88rem;
      font-weight: 500;
      color: var(--text-300);
      cursor: pointer;
      transition: all .15s ease;
      border: 1px solid transparent;
      user-select: none;
    }
    .sidebar-item:hover  { background: var(--bg-700); color: var(--text-100); }
    .sidebar-item.active {
      background: rgba(79,142,247,.12);
      border-color: rgba(79,142,247,.25);
      color: var(--accent);
    }
    .sidebar-item .icon { font-size: 1rem; width: 20px; text-align: center; }

    .sidebar-divider { height: 1px; background: var(--border); margin: .5rem 0; }

    /* FRAME WRAP */
    .frame-wrap {
      grid-column: 2;
      grid-row: 2;
      position: relative;
      overflow: hidden;
    }
    .frame-wrap iframe { width: 100%; height: 100%; border: none; }

    /* Overlay de carga */
    #frame-loading {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: var(--bg-900);
      color: var(--text-300);
      font-size: .9rem;
      gap: .5rem;
      pointer-events: none;
      z-index: 10;
    }
    #frame-loading.visible { display: flex; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
  </style>
</head>
<body>

<div class="admin-shell">

  <!-- NAVBAR
       navbar.js detecta que .navbar ya existe en el DOM →
       NO crea uno nuevo, solo engancha el #theme-toggle de aquí abajo. -->
  <nav class="navbar">
    <a href="dashboard.html" style="color:var(--text-300);font-size:.82rem;text-decoration:none">
      ⬅️Atrás
    </a>
    <span class="navbar-brand">⭐ Panel Admin</span>
    <div class="navbar-nav">
      <span id="nav-nombre" style="font-size:.82rem;color:var(--text-300);margin-right:.5rem"></span>
      <!-- navbar.js engancha este botón para el toggle de tema -->
      <button id="theme-toggle" class="btn btn-ghost btn-sm" title="Modo claro">🌙</button>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Salir</button>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">

    <div class="sidebar-item active" data-page="entrenador_gestos" onclick="navegar(this)">
      <span class="icon">🖐️</span> Entrenador de gestos
    </div>

    <div class="sidebar-item" data-page="gestos_registrados" onclick="navegar(this)">
      <span class="icon">📋</span> Gestos registrados
    </div>

    <div class="sidebar-item" data-page="test_reconocimiento" onclick="navegar(this)">
      <span class="icon">🧪</span> Test de reconocimiento
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-item" data-page="configuracion" onclick="navegar(this)">
      <span class="icon">🎛️</span> Configuración
    </div>

    <div class="sidebar-item" data-page="usuarios" onclick="navegar(this)">
      <span class="icon">👥</span> Usuarios
    </div>

    <div class="sidebar-item" data-page="estadisticas" onclick="navegar(this)">
      <span class="icon">📊</span> Estadísticas
    </div>

  </aside>

  <!-- IFRAME -->
  <div class="frame-wrap">
    <iframe id="page-frame" src="admin_pages/entrenador_gestos.html"></iframe>
    <div id="frame-loading">
      <div class="spinner"></div> Cargando...
    </div>
  </div>

</div>

<!-- navbar.js primero: engancha #theme-toggle y aplica el tema guardado -->
<script src="js/navbar.js"></script>
<script src="js/app.js"></script>
<script>
  // ── Auth guard ─────────────────────────────────────────────
  Auth.requerir();
  if (!Auth.esAdmin()) { window.location.replace('dashboard.html'); }

  document.getElementById('nav-nombre').textContent = Auth.usuario()?.nombre || '';

  // ── Navegación ─────────────────────────────────────────────
  const frame   = document.getElementById('page-frame');
  const loading = document.getElementById('frame-loading');

  function navegar(el) {
    const page = el.dataset.page;
    if (!page) return;

    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    loading.classList.add('visible');
    frame.src = `admin_pages/${page}.html`;
  }

  frame.addEventListener('load', () => loading.classList.remove('visible'));

  // ── Navegación directa por URL: admin.html?page=estadisticas ──
  (() => {
    const page = new URLSearchParams(window.location.search).get('page');
    if (page) {
      const item = document.querySelector(`[data-page="${page}"]`);
      if (item) navegar(item);
    }
  })();

  // ── API para que las sub-páginas naveguen desde el iframe ──
  // Uso: window.parent.adminNavegar('configuracion')
  window.adminNavegar = (page) => {
    const item = document.querySelector(`[data-page="${page}"]`);
    if (item) navegar(item);
  };
</script>

</body>
</html>
