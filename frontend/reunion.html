<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Traductor de Gestos — Reunión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/navbar.js"></script>

  <style>
    /* ══════════════════════════════════════════════
       RESET Y BASE
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --meet-bg:       #0a0c10;
      --meet-surface:  #13161d;
      --meet-border:   rgba(255,255,255,.07);
      --meet-border-hi:rgba(255,255,255,.14);
      --meet-text:     #e8eaf0;
      --meet-muted:    #6b7fa0;
      --bar-h:         72px;
      --nav-h:         0px; /* navbar oculto en reunión */
      --accent:        #6366f1;
      --accent-2:      #14b8a6;
      --user1-color:   #6366f1;   /* morado — sordomudo */
      --user2-color:   #14b8a6;   /* teal   — oyente    */
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--meet-bg);
      color: var(--meet-text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Ocultar navbar del sistema en esta página */
    .navbar { display: none !important; }

    /* ══════════════════════════════════════════════
       ESTRUCTURA PRINCIPAL
       NAV COMPACTO + SALA (40/20/40) + BARRA
    ══════════════════════════════════════════════ */

    /* Nav compacto de reunión */
    .meet-nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 48px; z-index: 200;
      background: rgba(10,12,16,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--meet-border);
      display: flex; align-items: center;
      padding: 0 1.25rem; gap: .75rem;
    }
    .meet-nav-brand {
      font-weight: 800; font-size: .9rem;
      letter-spacing: -.025em;
      background: linear-gradient(135deg, var(--user1-color), var(--user2-color));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .meet-nav-code {
      font-family: 'DM Mono', monospace;
      font-size: .72rem; color: var(--meet-muted);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--meet-border);
      padding: .2rem .65rem; border-radius: 999px;
    }
    .meet-nav-time {
      font-size: .8rem; font-weight: 600;
      color: var(--meet-text);
      font-family: 'DM Mono', monospace;
      margin-left: auto;
    }
    .meet-nav-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #10b981; box-shadow: 0 0 6px #10b981;
      animation: navDotPulse 2s ease-in-out infinite;
    }
    @keyframes navDotPulse {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.5;transform:scale(.8)}
    }

    /* Layout 40/20/40 */
    .sala-layout {
      position: fixed;
      top: 48px; bottom: var(--bar-h);
      left: 0; right: 0;
      display: grid;
      grid-template-columns: 40fr 20fr 40fr;
      gap: 0;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════
       PANEL DE USUARIO — 40% c/u
    ══════════════════════════════════════════════ */
    .user-panel {
      position: relative;
      display: flex; flex-direction: column;
      background: #000;
      overflow: hidden;
    }
    .user-panel.user-left  { border-right: 1px solid var(--meet-border); }
    .user-panel.user-right { border-left:  1px solid var(--meet-border); }

    /* Header del panel */
    .user-panel-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: .65rem 1rem;
      display: flex; align-items: center; gap: .6rem;
      background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
      z-index: 10;
    }
    .user-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .22rem .7rem; border-radius: 999px;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      backdrop-filter: blur(8px);
      border: 1px solid;
    }
    .user-left  .user-badge {
      background: rgba(99,102,241,.18);
      border-color: rgba(99,102,241,.35);
      color: #a5b4fc;
    }
    .user-right .user-badge {
      background: rgba(20,184,166,.18);
      border-color: rgba(20,184,166,.35);
      color: #5eead4;
    }
    .user-badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      animation: navDotPulse 2s infinite;
    }
    .user-left  .user-badge-dot { background: #818cf8; box-shadow: 0 0 5px #818cf8; }
    .user-right .user-badge-dot { background: #2dd4bf; box-shadow: 0 0 5px #2dd4bf; }

    /* Video en sí */
    .user-video-wrap {
      flex: 1; position: relative; overflow: hidden;
    }
    .user-video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
    }
    .canvas-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Placeholder cuando la cámara está apagada */
    .cam-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .75rem;
      background: radial-gradient(ellipse at center, #141926 0%, #0a0c10 100%);
    }
    .cam-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.1rem; font-weight: 800;
      border: 2px solid;
    }
    .user-left  .cam-avatar {
      background: rgba(99,102,241,.12);
      border-color: rgba(99,102,241,.3);
      color: #a5b4fc;
      box-shadow: 0 0 32px rgba(99,102,241,.15);
    }
    .user-right .cam-avatar {
      background: rgba(20,184,166,.12);
      border-color: rgba(20,184,166,.3);
      color: #5eead4;
      box-shadow: 0 0 32px rgba(20,184,166,.15);
    }
    .cam-placeholder-name {
      font-size: .85rem; font-weight: 600;
      color: rgba(255,255,255,.6);
    }
    .cam-placeholder-status {
      font-size: .72rem; color: rgba(255,255,255,.35);
      display: flex; align-items: center; gap: .35rem;
    }
    .cam-placeholder-status::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #f87171; display: inline-block;
    }

    /* ── ÁREA DE TRADUCCIÓN — 25% inferior del panel ── */
    .translation-area {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 28%;
      padding: 1rem 1.25rem;
      display: flex; flex-direction: column; justify-content: flex-end; gap: .5rem;
      /* Overlay degradado */
      background: linear-gradient(
        to top,
        rgba(0,0,0,.88) 0%,
        rgba(0,0,0,.72) 60%,
        transparent 100%
      );
      z-index: 5;
    }

    /* Estado de actividad */
    .transl-status {
      display: inline-flex; align-items: center; gap: .45rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .user-left  .transl-status { color: #818cf8; }
    .user-right .transl-status { color: #2dd4bf; }

    .transl-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: navDotPulse 1.5s ease-in-out infinite;
    }
    .user-left  .transl-status-dot { background: #818cf8; box-shadow: 0 0 6px #818cf8; }
    .user-right .transl-status-dot { background: #2dd4bf; box-shadow: 0 0 6px #2dd4bf; }

    /* Texto principal de traducción */
    .transl-text {
      font-size: clamp(.9rem, 1.5vw, 1.15rem);
      font-weight: 600; line-height: 1.45;
      color: rgba(255,255,255,.92);
      min-height: 1.5em;
      word-break: break-word;
    }
    .transl-text.empty { color: rgba(255,255,255,.25); font-weight: 400; font-style: italic; }

    /* Gesto/letra actual (solo usuario 1) */
    .transl-gesture {
      display: flex; align-items: center; gap: .75rem;
    }
    .gesture-letra {
      font-size: 2rem; font-weight: 800; line-height: 1;
      color: #818cf8;
      font-family: 'DM Mono', monospace;
      min-width: 1.8ch;
    }
    .gesture-info { display: flex; flex-direction: column; gap: .2rem; }
    .gesture-palabra {
      font-size: .82rem; font-weight: 600; color: #a5b4fc;
    }
    .gesture-confianza-wrap { display: flex; align-items: center; gap: .5rem; }
    .gesture-confianza-bar {
      width: 80px; height: 3px;
      background: rgba(255,255,255,.1); border-radius: 999px; overflow: hidden;
    }
    .gesture-confianza-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      width: 0%;
      transition: width .3s ease;
    }
    .gesture-confianza-val {
      font-size: .65rem; color: rgba(255,255,255,.4);
      font-family: 'DM Mono', monospace;
    }

    /* Icono altavoz (usuario 2) */
    .transl-speaker {
      display: flex; align-items: center; gap: .5rem;
    }
    .speaker-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(20,184,166,.15);
      border: 1px solid rgba(20,184,166,.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .speaker-icon svg { width: 14px; height: 14px; }
    .speaker-wave {
      display: flex; align-items: flex-end; gap: 2px; height: 16px;
    }
    .sw-bar {
      width: 3px; border-radius: 2px;
      background: #2dd4bf;
      animation: swBar 1.1s ease-in-out infinite alternate;
    }
    .sw-bar:nth-child(1) { height: 4px;  animation-delay: 0s; }
    .sw-bar:nth-child(2) { height: 10px; animation-delay: .15s; }
    .sw-bar:nth-child(3) { height: 16px; animation-delay: .3s; }
    .sw-bar:nth-child(4) { height: 10px; animation-delay: .45s; }
    .sw-bar:nth-child(5) { height: 6px;  animation-delay: .6s; }
    @keyframes swBar {
      from { transform: scaleY(.4); opacity: .5; }
      to   { transform: scaleY(1);  opacity: 1; }
    }
    .speaker-wave.silent .sw-bar {
      animation: none;
      height: 3px !important;
      opacity: .25;
    }

    /* Borde de color inferior del panel */
    .user-left::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,.6), transparent);
    }
    .user-right::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(20,184,166,.6), transparent);
    }

    /* ══════════════════════════════════════════════
       PANEL CENTRAL — CHAT 20%
    ══════════════════════════════════════════════ */
    .chat-panel {
      display: flex; flex-direction: column;
      background: var(--meet-surface);
      border-left: 1px solid var(--meet-border);
      border-right: 1px solid var(--meet-border);
      overflow: hidden;
      position: relative;
    }

    /* Header chat */
    .chat-header {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--meet-border);
      display: flex; align-items: center; gap: .6rem;
      flex-shrink: 0;
      background: rgba(255,255,255,.02);
    }
    .chat-header-icon {
      width: 32px; height: 32px; border-radius: 10px;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.2);
      display: flex; align-items: center; justify-content: center;
    }
    .chat-header-icon svg { width: 14px; height: 14px; stroke: #818cf8; }
    .chat-header-title {
      font-size: .88rem; font-weight: 700;
      letter-spacing: -.02em;
      flex: 1;
    }
    .chat-header-count {
      font-size: .68rem; font-weight: 600;
      color: var(--meet-muted);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--meet-border);
      padding: .15rem .5rem; border-radius: 999px;
    }

    /* Subtítulo en vivo arriba del chat */
    .chat-live-sub {
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--meet-border);
      background: rgba(99,102,241,.04);
      min-height: 38px;
      display: none;
      flex-direction: column; gap: .1rem;
      flex-shrink: 0;
    }
    .chat-live-sub.visible { display: flex; }
    .live-sub-who { font-size: .62rem; font-weight: 700; color: #818cf8; letter-spacing: .04em; text-transform: uppercase; }
    .live-sub-text { font-size: .8rem; color: rgba(255,255,255,.75); }

    /* Mensajes */
    .chat-mensajes {
      flex: 1; overflow-y: auto;
      padding: .75rem;
      display: flex; flex-direction: column; gap: .5rem;
      scroll-behavior: smooth;
    }
    .chat-mensajes::-webkit-scrollbar { width: 3px; }
    .chat-mensajes::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 999px; }

    /* Burbuja de mensaje */
    .msg-wrap {
      display: flex; flex-direction: column; gap: .15rem;
      animation: msgIn .2s ease both;
    }
    @keyframes msgIn {
      from { opacity:0; transform: translateY(6px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg-wrap.propio { align-items: flex-end; }
    .msg-wrap.sistema { align-items: center; }

    .msg-who {
      font-size: .62rem; font-weight: 700;
      letter-spacing: .03em; text-transform: uppercase;
      padding: 0 .35rem;
    }
    .msg-who.user1 { color: #818cf8; }
    .msg-who.user2 { color: #2dd4bf; }

    .msg-bubble {
      max-width: 90%;
      padding: .5rem .75rem;
      border-radius: 14px;
      font-size: .82rem;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .msg-wrap:not(.propio):not(.sistema) .msg-bubble {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--meet-border);
      border-top-left-radius: 4px;
    }
    .msg-wrap.propio .msg-bubble {
      background: rgba(99,102,241,.18);
      border: 1px solid rgba(99,102,241,.3);
      border-bottom-right-radius: 4px;
    }
    .msg-ia-badge {
      font-size: .6rem; color: #2dd4bf;
      margin-top: .25rem;
      display: flex; align-items: center; gap: .25rem;
      opacity: .75;
    }
    .msg-hora {
      font-size: .58rem; color: rgba(255,255,255,.2);
      padding: 0 .35rem;
    }
    .msg-sistema-text {
      font-size: .68rem; color: rgba(255,255,255,.3);
      font-style: italic;
      text-align: center;
    }

    /* Input de chat */
    .chat-input-wrap {
      padding: .65rem .75rem;
      border-top: 1px solid var(--meet-border);
      display: flex; gap: .4rem; align-items: flex-end;
      background: rgba(255,255,255,.02);
      flex-shrink: 0;
    }
    .chat-textarea {
      flex: 1; resize: none; min-height: 36px; max-height: 80px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--meet-border);
      border-radius: 10px;
      color: var(--meet-text);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      padding: .5rem .75rem;
      outline: none;
      transition: border-color .2s;
      line-height: 1.45;
    }
    .chat-textarea:focus { border-color: rgba(99,102,241,.4); }
    .chat-textarea::placeholder { color: rgba(255,255,255,.2); }
    .chat-send-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(99,102,241,.2);
      border: 1px solid rgba(99,102,241,.3);
      color: #a5b4fc;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s, transform .15s;
      flex-shrink: 0;
    }
    .chat-send-btn:hover { background: rgba(99,102,241,.35); transform: scale(1.06); }
    .chat-send-btn svg { width: 14px; height: 14px; }

    /* ══════════════════════════════════════════════
       BARRA INFERIOR — CONTROLES MODERNOS
    ══════════════════════════════════════════════ */
    .meet-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: rgba(10,12,16,.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--meet-border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      z-index: 100;
    }

    /* Izquierda: info sala */
    .bar-left {
      display: flex; align-items: center; gap: .75rem;
    }
    .bar-sala-info { display: flex; flex-direction: column; }
    .bar-time {
      font-size: .82rem; font-weight: 700;
      font-family: 'DM Mono', monospace;
      color: var(--meet-text);
    }
    .bar-code {
      font-size: .68rem; color: var(--meet-muted);
      font-family: 'DM Mono', monospace;
    }

    /* Centro: botones */
    .bar-center {
      display: flex; align-items: center; gap: .5rem;
    }

    /* Botón control base */
    .cb {
      position: relative;
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid var(--meet-border-hi);
      background: rgba(255,255,255,.06);
      color: var(--meet-text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s, border-color .18s, transform .15s, box-shadow .18s;
      flex-shrink: 0;
    }
    .cb svg { width: 20px; height: 20px; stroke: currentColor; pointer-events: none; }
    .cb:hover {
      background: rgba(255,255,255,.12);
      border-color: var(--meet-border-hi);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,.3);
    }
    .cb:active { transform: translateY(0) scale(.95); }

    /* Estado OFF = rojo */
    .cb.state-off {
      background: rgba(239,68,68,.18);
      border-color: rgba(239,68,68,.35);
      color: #fca5a5;
    }
    .cb.state-off:hover {
      background: rgba(239,68,68,.28);
      border-color: rgba(239,68,68,.5);
    }

    /* Estado ON = indigo */
    .cb.state-on {
      background: rgba(99,102,241,.22);
      border-color: rgba(99,102,241,.45);
      color: #a5b4fc;
      box-shadow: 0 0 16px rgba(99,102,241,.2);
    }

    /* Tooltip */
    .cb[data-tip] { position: relative; }
    .cb[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%);
      background: #1e2736;
      border: 1px solid rgba(255,255,255,.1);
      color: var(--meet-text);
      font-size: .68rem; white-space: nowrap;
      padding: .25rem .6rem; border-radius: 6px;
      pointer-events: none; z-index: 300;
      font-family: 'DM Sans', sans-serif;
    }

    /* Botón FIN LLAMADA — más ancho */
    .cb-end {
      width: auto; height: 48px;
      border-radius: 999px;
      padding: 0 1.4rem;
      border: none;
      background: #dc2626;
      color: #fff;
      font-size: .82rem; font-weight: 700;
      display: flex; align-items: center; gap: .5rem;
      cursor: pointer;
      transition: background .18s, transform .15s, box-shadow .18s;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 4px 16px rgba(220,38,38,.35);
    }
    .cb-end svg { width: 16px; height: 16px; stroke: currentColor; pointer-events: none; }
    .cb-end:hover {
      background: #b91c1c;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(220,38,38,.45);
    }
    .cb-end:active { transform: scale(.97); }

    /* Separador visual entre grupos */
    .bar-sep {
      width: 1px; height: 28px;
      background: var(--meet-border);
      margin: 0 .2rem;
    }

    /* Indicador de mano levantada */
    .hand-dot {
      position: absolute; top: -2px; right: -2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fbbf24;
      border: 2px solid var(--meet-bg);
      font-size: .5rem;
      display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 800;
    }

    /* Derecha: acciones secundarias */
    .bar-right {
      display: flex; align-items: center; gap: .5rem;
      justify-content: flex-end;
    }

    /* ══════════════════════════════════════════════
       MODAL SALA CERRADA
    ══════════════════════════════════════════════ */
    .overlay-cerrada {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .overlay-cerrada-box {
      background: var(--meet-surface);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; padding: 2rem;
      text-align: center; max-width: 340px; width: 90%;
    }
    .overlay-cerrada-box h2 { margin-bottom: .4rem; font-size: 1.2rem; font-weight: 800; }
    .overlay-cerrada-box p  { color: var(--meet-muted); font-size: .85rem; margin-bottom: 1.25rem; line-height: 1.55; }

    /* ══════════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════════ */
    #toast-container {
      position: fixed; bottom: calc(var(--bar-h) + .75rem); right: 1rem;
      display: flex; flex-direction: column; gap: .4rem;
      z-index: 9999; pointer-events: none;
    }
    .toast {
      background: rgba(19,22,29,.96);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: .6rem 1rem;
      font-size: .8rem; font-weight: 500; color: var(--meet-text);
      display: flex; align-items: center; gap: .5rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideIn .2s cubic-bezier(.34,1.56,.64,1);
      pointer-events: auto; max-width: 280px;
    }
    .toast.success { border-left: 3px solid #10b981; }
    .toast.error   { border-left: 3px solid #f43f5e; }
    .toast.info    { border-left: 3px solid #6366f1; }
    @keyframes slideIn {
      from { transform: translateX(110%) scale(.9); opacity: 0; }
      to   { transform: translateX(0)    scale(1);  opacity: 1; }
    }

    /* ══════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .sala-layout {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr auto;
      }
      .chat-panel {
        grid-column: 1 / -1;
        grid-row: 2;
        max-height: 220px;
      }
    }
    @media (max-width: 600px) {
      .sala-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr auto;
      }
      .user-right { grid-row: 2; }
      .chat-panel { grid-row: 3; grid-column: 1; max-height: 180px; }
      .bar-code, .bar-sala-info .bar-time { font-size: .7rem; }
      .cb { width: 42px; height: 42px; }
      .cb svg { width: 18px; height: 18px; }
      .cb-end { padding: 0 1rem; font-size: .75rem; }
    }
  </style>
</head>

<!-- ══════════════════════════════════════════════
     JAVASCRIPT — LÓGICA FUNCIONAL
     (mantiene toda la funcionalidad original)
══════════════════════════════════════════════ -->
<script src="js/app.js"></script>
<script>
  /* ── SVGs de iconos para toggle ── */
  const SVG = {
    CAM_ON:  `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`,
    CAM_OFF: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34"/><circle cx="12" cy="13" r="3"/></svg>`,
    MIC_ON:  `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
    MIC_OFF: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
    AUD_ON:  `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`,
    AUD_OFF: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`,
  };

  /* ── Toast local ── */
  function toast(msg, tipo = 'info') {
    const c = document.getElementById('toast-container');
    if (!c) return;
    const t = document.createElement('div');
    t.className = `toast ${tipo}`;
    const icons = { success:'✅', error:'❌', info:'💬' };
    t.innerHTML = `<span>${icons[tipo]||'ℹ️'}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => {
      t.style.transition = 'opacity .3s, transform .3s';
      t.style.opacity = '0'; t.style.transform = 'translateX(110%)';
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  /* ── Init ── */
  let usuario = { nombre: 'Tú', id: null };
  try {
    if (typeof Auth !== 'undefined') {
      Auth.requerirLogin();
      usuario = Auth.usuario() || usuario;
    }
  } catch(e) {}

  const params  = new URLSearchParams(location.search);
  const SALA_ID = params.get('sala') || 'DEMO-001';

  /* Actualizar UI con datos del usuario */
  function iniciales(nombre) {
    if (!nombre) return '?';
    return nombre.trim().split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2);
  }

  document.getElementById('avatar-u1').textContent  = iniciales(usuario.nombre);
  document.getElementById('nombre-u1').textContent  = usuario.nombre || 'Tú';
  document.getElementById('nav-sala-code').textContent = SALA_ID;
  document.getElementById('bar-code').textContent      = SALA_ID;

  /* ── Reloj ── */
  function updateTime() {
    const t = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('nav-time').textContent = t;
    document.getElementById('bar-time').textContent = t;
  }
  updateTime(); setInterval(updateTime, 1000);

  /* ── Estado de controles ── */
  let camaraActiva  = false;
  let micActivo     = false;
  let audioActivo   = true;
  let manoLevantada = false;
  let soyCreador    = false;
  let capturador    = null;
  let salaWS        = null;
  let mensajesMap   = {};
  let msgCount      = 0;

  /* ── TOGGLE CÁMARA ── */
  async function toggleCamara() {
    const btn     = document.getElementById('btn-cam');
    const videoEl = document.getElementById('video-local');
    const canvas  = document.getElementById('canvas-captura');

    if (!camaraActiva) {
      try {
        /* Iniciar stream */
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoEl.srcObject = stream;
        videoEl.style.display = 'block';
        document.getElementById('placeholder-u1').style.display = 'none';
        document.getElementById('cam-estado-u1').textContent = '● Activa';
        document.getElementById('cam-estado-u1').style.color = '#34d399';
        btn.innerHTML = SVG.CAM_ON;
        btn.classList.remove('state-off'); btn.classList.add('state-on');
        camaraActiva = true;
        toast('Cámara activada', 'success');

        /* Si hay capturador (MediaPipe), iniciarlo */
        if (typeof CapturadorCamara !== 'undefined') {
          capturador = new CapturadorCamara(videoEl, canvas, (b64) => salaWS?.enviarFrame(b64), 12);
          await capturador.iniciar(btn);
        }
      } catch(e) {
        toast('No se pudo acceder a la cámara', 'error');
      }
    } else {
      /* Apagar */
      if (videoEl.srcObject) {
        videoEl.srcObject.getTracks().forEach(t => t.stop());
        videoEl.srcObject = null;
      }
      capturador?.detener(); capturador = null;
      videoEl.style.display = 'none';
      document.getElementById('placeholder-u1').style.display = 'flex';
      document.getElementById('cam-estado-u1').textContent = 'Cámara apagada';
      document.getElementById('cam-estado-u1').style.color = '';
      btn.innerHTML = SVG.CAM_OFF;
      btn.classList.remove('state-on'); btn.classList.add('state-off');
      camaraActiva = false;
      toast('Cámara desactivada', 'info');
    }
  }

  /* ── TOGGLE MICRÓFONO ── */
  function toggleMic() {
    micActivo = !micActivo;
    const btn = document.getElementById('btn-mic');
    btn.innerHTML = micActivo ? SVG.MIC_ON : SVG.MIC_OFF;
    btn.classList.toggle('state-off', !micActivo);
    btn.classList.toggle('state-on',  micActivo);
    toast(micActivo ? 'Micrófono activado' : 'Micrófono silenciado', 'info');
  }

  /* ── TOGGLE AUDIO ── */
  function toggleAudio() {
    audioActivo = !audioActivo;
    const btn = document.getElementById('btn-audio');
    btn.innerHTML = audioActivo ? SVG.AUD_ON : SVG.AUD_OFF;
    btn.classList.toggle('state-off', !audioActivo);
    btn.classList.toggle('state-on',   audioActivo);
    /* También controlar las ondas del altavoz */
    document.getElementById('u2-wave').classList.toggle('silent', !audioActivo);
  }

  /* ── LEVANTAR MANO ── */
  function toggleMano() {
    manoLevantada = !manoLevantada;
    const btn = document.getElementById('btn-mano');
    btn.classList.toggle('state-on', manoLevantada);
    if (manoLevantada) {
      if (!btn.querySelector('.hand-dot')) {
        btn.insertAdjacentHTML('beforeend', '<div class="hand-dot">!</div>');
      }
      toast('Mano levantada — todos lo ven', 'info');
    } else {
      btn.querySelector('.hand-dot')?.remove();
    }
    salaWS?.enviarMano?.(manoLevantada);
  }

  /* ── FIN FRASE ── */
  function finFrase() {
    salaWS?.finFrase?.();
    toast('Frase confirmada', 'success');
  }

  /* ── LIMPIAR RECONOCIMIENTO ── */
  function limpiarRecono() {
    salaWS?.limpiar?.();
    document.getElementById('u1-letra').textContent        = '—';
    document.getElementById('u1-palabra').textContent      = '';
    document.getElementById('u1-texto').textContent        = 'Esperando gestos...';
    document.getElementById('u1-texto').classList.add('empty');
    document.getElementById('u1-confianza-bar').style.width = '0%';
    document.getElementById('u1-confianza-val').textContent  = '0%';
  }

  /* ── ACTUALIZAR UI DE RECONOCIMIENTO ── */
  function actualizarReconoUI(letra, palabra, frase, confianza) {
    document.getElementById('u1-letra').textContent   = letra || '—';
    document.getElementById('u1-palabra').textContent = palabra || '';
    if (frase) {
      const el = document.getElementById('u1-texto');
      el.textContent = frase; el.classList.remove('empty');
    }
    const pct = Math.round((confianza || 0) * 100);
    document.getElementById('u1-confianza-bar').style.width = pct + '%';
    document.getElementById('u1-confianza-val').textContent  = pct + '%';
  }

  /* ── MENSAJES CHAT ── */
  function addMsg(d, scroll = true) {
    const propio  = d.usuario_id === usuario.id;
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrap ${propio ? 'propio' : ''}`;
    wrapper.id = `msg-${d.mensaje_id}`;

    const hora = d.timestamp
      ? new Date(d.timestamp).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' })
      : new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });

    const txt = d.texto_corregido || d.texto || '';
    const whoClass = propio ? 'user1' : 'user2';

    wrapper.innerHTML = `
      <span class="msg-who ${whoClass}">${d.nombre || 'Anónimo'}</span>
      <div class="msg-bubble">${txt}</div>
      ${d.texto_corregido && d.texto_corregido !== d.texto
        ? `<div class="msg-ia-badge">✨ Corregido por IA</div>` : ''}
      <span class="msg-hora">${hora}</span>
    `;

    document.getElementById('chat-mensajes').appendChild(wrapper);
    mensajesMap[d.mensaje_id] = wrapper;
    msgCount++;
    document.getElementById('chat-count').textContent = `${msgCount} mensaje${msgCount !== 1 ? 's' : ''}`;
    if (scroll) document.getElementById('chat-mensajes').scrollTop = 99999;
  }

  function addSistema(texto) {
    const div = document.createElement('div');
    div.className = 'msg-sistema-text';
    div.textContent = texto;
    document.getElementById('chat-mensajes').appendChild(div);
    document.getElementById('chat-mensajes').scrollTop = 99999;
  }

  /* ── ENVIAR TEXTO ── */
  function enviarTexto() {
    const input = document.getElementById('chat-input');
    const texto = input.value.trim();
    if (!texto) return;
    salaWS?.enviarTexto?.(texto);
    /* Previsualizar localmente si no hay WS */
    if (!salaWS) {
      addMsg({ mensaje_id: Date.now(), usuario_id: usuario.id, nombre: usuario.nombre, texto });
    }
    input.value = '';
  }

  /* ── SUBTÍTULOS EN VIVO ── */
  let subTimer = null;
  function recibirTraduccion(d) {
    const sub = document.getElementById('chat-live-sub');
    document.getElementById('live-sub-who').textContent = (d.nombre || 'Alguien') + ':';
    document.getElementById('live-sub-text').textContent = d.frase_completa || d.palabra_actual || '...';
    sub.classList.add('visible');
    clearTimeout(subTimer);
    subTimer = setTimeout(() => sub.classList.remove('visible'), 4000);
    /* Actualizar panel user1 si es su reconocimiento */
    if (d.letra_actual || d.palabra_actual || d.frase_completa) {
      actualizarReconoUI(d.letra_actual, d.palabra_actual, d.frase_completa, d.confianza);
    }
    /* Activar ondas del altavoz si viene del oyente */
    if (!d.es_propio) {
      const wave = document.getElementById('u2-wave');
      wave.classList.remove('silent');
      const el = document.getElementById('u2-texto');
      el.textContent = d.frase_completa || d.texto || '';
      el.classList.remove('empty');
      clearTimeout(wave._timer);
      wave._timer = setTimeout(() => wave.classList.add('silent'), 3000);
    }
  }

  /* ── PARTICIPANTES ── */
  function actualizarParticipantes(d) {
    const parts = d.participantes || [];
    /* Mostrar el otro participante en el panel derecho */
    const otro = parts.find(p => p.id !== usuario.id);
    if (otro) {
      document.getElementById('avatar-u2').textContent    = iniciales(otro.nombre);
      document.getElementById('nombre-u2').textContent    = otro.nombre;
      document.getElementById('cam-estado-u2').textContent = '● Conectado';
      document.getElementById('cam-estado-u2').style.color = '#34d399';
    }
  }

  /* ── VIDEO REMOTO WebRTC ── */
  function mostrarVideoRemoto(stream) {
    const vid = document.getElementById('video-remoto');
    vid.srcObject = stream;
    vid.style.display = 'block';
    document.getElementById('placeholder-u2').style.display = 'none';
  }
  document.addEventListener('webrtc:stream', e => mostrarVideoRemoto(e.detail.stream));

  /* ── CONECTAR WS ── */
  function conectarWS() {
    if (typeof SalaWS === 'undefined') {
      addSistema('Modo demo — sin WebSocket activo');
      return;
    }
    salaWS = new SalaWS(SALA_ID, {
      onConectado:     () => { toast('Conectado a la sala', 'success'); cargarHistorial(); },
      onDesconectado:  () => toast('Reconectando...', 'info'),
      onMensaje:       (d) => { addMsg(d); },
      onTraduccion:    recibirTraduccion,
      onSistema:       (d) => {
        if (d.mensaje?.includes('cerró la sala') && !soyCreador) { mostrarCerrada(); return; }
        addSistema(d.mensaje);
      },
      onParticipantes: actualizarParticipantes,
      onCorreccionIA:  (d) => {
        const el = mensajesMap[d.mensaje_id]; if (!el) return;
        const b = el.querySelector('.msg-bubble'); if (b) b.textContent = d.texto_corregido;
      },
      onError: () => toast('Error de conexión', 'error'),
    });
    salaWS.conectar();
  }

  async function cargarHistorial() {
    try {
      const { mensajes } = await Api.get(`/reuniones/${SALA_ID}/mensajes`);
      mensajes.forEach(m => addMsg({
        mensaje_id: m.id, usuario_id: m.autor_id, nombre: m.autor,
        texto: m.texto_original, texto_corregido: m.texto_corregido, timestamp: m.enviado_en
      }, false));
      document.getElementById('chat-mensajes').scrollTop = 99999;
    } catch(e) {}
  }

  async function verificarCreador() {
    try {
      if (typeof Api === 'undefined') return;
      const res = await Api.get(`/reuniones/${SALA_ID}/info`);
      soyCreador = res.es_creador;
      if (soyCreador) document.getElementById('btn-cerrar-sala').style.display = '';
    } catch(e) {}
  }

  /* ── SALIR / CERRAR SALA ── */
  function _cleanup() {
    capturador?.detener?.();
    salaWS?.desconectar?.();
    const v = document.getElementById('video-local');
    if (v?.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
    window.speechSynthesis?.cancel?.();
  }

  function salirDeSala() { _cleanup(); window.location.href = 'dashboard.html'; }

  async function cerrarSala() {
    if (!soyCreador) { toast('Solo el creador puede cerrar la sala', 'error'); return; }
    if (!confirm('¿Cerrar la sala para TODOS los participantes?')) return;
    try {
      await Api.delete(`/reuniones/${SALA_ID}/cerrar`);
      toast('Sala cerrada', 'success');
      setTimeout(() => { _cleanup(); window.location.href = 'dashboard.html'; }, 700);
    } catch(e) { toast(e.message, 'error'); }
  }

  function mostrarCerrada() {
    _cleanup();
    const o = document.createElement('div'); o.className = 'overlay-cerrada';
    o.innerHTML = `<div class="overlay-cerrada-box">
      <h2>Sala cerrada</h2>
      <p>El creador cerró esta reunión.</p>
      <button class="btn btn-primary btn-full" onclick="window.location.href='dashboard.html'">Volver al dashboard</button>
    </div>`;
    document.body.appendChild(o);
  }

  /* ── START ── */
  conectarWS();
  verificarCreador();
  window.addEventListener('beforeunload', _cleanup);
</script>
</body>
</html>
