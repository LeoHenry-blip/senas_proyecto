<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🤟 Prueba de Reconocimiento de Señas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0d13; color: #e8edf5;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; padding: 1.5rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; color: #4f8ef7; }

    .layout {
      display: grid;
      grid-template-columns: 520px 1fr;
      gap: 1.5rem;
      max-width: 1100px;
    }

    /* Cámara */
    .camara-wrap {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      border: 2px solid #2a3550;
    }
    #video  { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* Panel derecho */
    .panel { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: #151b25;
      border: 1px solid #2a3550;
      border-radius: 12px;
      padding: 1.25rem;
    }
    .card h3 { font-size: .85rem; color: #738099; text-transform: uppercase;
               letter-spacing: .06em; margin-bottom: .75rem; }

    /* Letra grande */
    .letra-display {
      font-size: 7rem; font-weight: 900; line-height: 1;
      color: #4f8ef7; text-align: center;
      text-shadow: 0 0 40px rgba(79,142,247,.4);
      min-height: 7rem;
    }
    .palabra-display {
      font-size: 1.6rem; font-weight: 700;
      color: #38d9a9; text-align: center; margin-top: .5rem;
      min-height: 2rem;
    }
    .frase-display {
      font-size: 1rem; color: #b0bcce; text-align: center;
      margin-top: .4rem; min-height: 1.4rem;
      word-break: break-all;
    }

    /* Confianza */
    .conf-label {
      display: flex; justify-content: space-between;
      font-size: .8rem; color: #738099; margin-bottom: .4rem;
    }
    .progress {
      width: 100%; height: 12px;
      background: #1c2535; border-radius: 999px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; border-radius: 999px;
      transition: width .15s ease, background .3s ease;
      background: #4f8ef7;
    }

    /* Top 3 candidatos */
    .candidatos { display: flex; flex-direction: column; gap: .4rem; }
    .cand-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .45rem .75rem;
      background: #1c2535; border-radius: 8px;
    }
    .cand-nombre {
      font-family: monospace; font-weight: 700;
      font-size: 1rem; min-width: 40px; color: #4f8ef7;
    }
    .cand-bar-wrap { flex: 1; background: #0f1319; border-radius: 999px; height: 8px; overflow: hidden; }
    .cand-bar { height: 100%; border-radius: 999px; background: #2a3550; transition: width .2s ease; }
    .cand-pct { font-size: .78rem; color: #738099; min-width: 38px; text-align: right; }

    /* Historial */
    .historial-letras {
      display: flex; flex-wrap: wrap; gap: .3rem;
      min-height: 36px;
    }
    .hist-letra {
      background: #1c2535; border: 1px solid #2a3550;
      border-radius: 6px; padding: .2rem .5rem;
      font-family: monospace; font-size: .85rem; color: #b0bcce;
      animation: popIn .15s ease;
    }
    @keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }

    /* Botones */
    .botones { display: flex; gap: .5rem; flex-wrap: wrap; }
    .btn {
      padding: .5rem 1rem; border-radius: 8px; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: all .15s ease;
    }
    .btn-blue   { background: #4f8ef7; color: #fff; }
    .btn-blue:hover { background: #3d7de8; }
    .btn-green  { background: #22c55e; color: #fff; }
    .btn-green:hover { background: #16a34a; }
    .btn-red    { background: #ef4444; color: #fff; }
    .btn-red:hover   { background: #dc2626; }
    .btn-gray   { background: #1c2535; color: #b0bcce; border: 1px solid #2a3550; }
    .btn-gray:hover  { background: #243048; }

    /* Estado */
    .estado-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .3rem .75rem; border-radius: 999px;
      font-size: .78rem; font-weight: 600;
      background: rgba(239,68,68,.15); color: #ef4444;
      border: 1px solid rgba(239,68,68,.3);
    }
    .estado-badge.activo {
      background: rgba(34,197,94,.15); color: #22c55e;
      border-color: rgba(34,197,94,.3);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* Log */
    #log {
      background: #0f1319; border-radius: 8px; padding: .75rem;
      font-family: monospace; font-size: .75rem; color: #738099;
      height: 100px; overflow-y: auto;
    }
    .log-ok   { color: #22c55e; }
    .log-warn { color: #f59e0b; }
    .log-err  { color: #ef4444; }

    /* Mano detectada indicator */
    .mano-indicator {
      text-align: center; font-size: .82rem; color: #738099;
      margin-top: .4rem;
    }
    .mano-indicator.detectada { color: #22c55e; }
  </style>
</head>
<body>

<h1>🤟 Prueba de Reconocimiento — Señas V2</h1>

<div class="layout">

  <!-- CÁMARA -->
  <div>
    <div class="camara-wrap">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="mano-indicator" id="mano-indicator">Sin mano detectada</div>
    <div style="margin-top:.75rem; display:flex; align-items:center; gap:.75rem">
      <span class="estado-badge" id="estado-badge">
        <span class="dot"></span> Cámara apagada
      </span>
      <span id="fps-display" style="font-size:.78rem; color:#738099"></span>
    </div>
    <div class="botones" style="margin-top:.75rem">
      <button class="btn btn-blue"  onclick="iniciarCamara()">📷 Iniciar cámara</button>
      <button class="btn btn-red"   onclick="detenerCamara()">⏹ Detener</button>
      <button class="btn btn-gray"  onclick="limpiarTodo()">🗑 Limpiar</button>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="panel">

    <!-- Gesto actual -->
    <div class="card">
      <h3>Gesto detectado</h3>
      <div class="letra-display"  id="letra-display">—</div>
      <div class="palabra-display" id="palabra-display"></div>
      <div class="frase-display"   id="frase-display"></div>
      <div style="margin-top:.75rem">
        <div class="conf-label">
          <span>Confianza</span>
          <span id="conf-valor">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="conf-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Top candidatos -->
    <div class="card">
      <h3>Top 3 candidatos</h3>
      <div class="candidatos" id="candidatos">
        <div style="color:#738099; font-size:.85rem">Inicia la cámara para ver candidatos</div>
      </div>
    </div>

    <!-- Historial de letras -->
    <div class="card">
      <h3>Historial de detecciones (últimas 20)</h3>
      <div class="historial-letras" id="historial"></div>
    </div>

    <!-- Log de sistema -->
    <div class="card">
      <h3>Log del sistema</h3>
      <div id="log"></div>
    </div>

  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_BASE = window.location.origin + '/api';
const TOKEN    = localStorage.getItem('token'); // Usa el token del login si existe

// ============================================================
// ESTADO
// ============================================================
let stream        = null;
let frameTimer    = null;
let frameCount    = 0;
let ultimaLetra   = '';
let historialArr  = [];
let fpsTimer      = null;
let framesEnviados = 0;

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ============================================================
// UTILIDADES DE LOG
// ============================================================
function log(msg, tipo = 'info') {
  const el  = document.getElementById('log');
  const cls = tipo === 'ok' ? 'log-ok' : tipo === 'error' ? 'log-err' : tipo === 'warn' ? 'log-warn' : '';
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  // Limitar a 50 líneas
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

// ============================================================
// CÁMARA
// ============================================================
async function iniciarCamara() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    canvas.width  = 640;
    canvas.height = 480;

    // Actualizar UI
    const badge = document.getElementById('estado-badge');
    badge.textContent = '';
    badge.innerHTML = '<span class="dot"></span> Cámara activa';
    badge.classList.add('activo');

    log('Cámara iniciada correctamente', 'ok');

    // Iniciar loop de captura a 15 FPS
    frameTimer = setInterval(capturarYEnviar, 1000 / 15);

    // Contador de FPS
    fpsTimer = setInterval(() => {
      document.getElementById('fps-display').textContent = `${framesEnviados} fps`;
      framesEnviados = 0;
    }, 1000);

  } catch (e) {
    log('Error de cámara: ' + e.message, 'error');
    alert('No se pudo acceder a la cámara: ' + e.message);
  }
}

function detenerCamara() {
  clearInterval(frameTimer);
  clearInterval(fpsTimer);
  stream?.getTracks().forEach(t => t.stop());
  video.srcObject = null;

  const badge = document.getElementById('estado-badge');
  badge.innerHTML = '<span class="dot"></span> Cámara apagada';
  badge.classList.remove('activo');
  log('Cámara detenida', 'warn');
}

// ============================================================
// CAPTURA Y ENVÍO AL SERVIDOR
// ============================================================
async function capturarYEnviar() {
  if (!video.videoWidth) return;

  frameCount++;
  framesEnviados++;

  // Dibujar frame espejado en canvas
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -640, 0, 640, 480);
  ctx.restore();

  // Comprimir a JPEG base64
  const b64 = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];

  // Si hay token, usar el endpoint del servidor
  if (TOKEN) {
    try {
      const res = await fetch(`${API_BASE}/admin/extraer-landmarks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${TOKEN}`
        },
        body: JSON.stringify({ frame_b64: b64 })
      });
      const data = await res.json();

      if (data.landmarks) {
        document.getElementById('mano-indicator').textContent = '✋ Mano detectada';
        document.getElementById('mano-indicator').className = 'mano-indicator detectada';
        // Buscar el gesto más cercano en el servidor
        buscarGestoLocal(data.landmarks);
      } else {
        document.getElementById('mano-indicator').textContent = 'Sin mano detectada';
        document.getElementById('mano-indicator').className = 'mano-indicator';
        limpiarDeteccion();
      }
    } catch (e) {
      log('Error al enviar frame: ' + e.message, 'error');
    }
  } else {
    log('No hay token. Inicia sesión primero en localhost:8000', 'warn');
    clearInterval(frameTimer);
  }
}

// ============================================================
// BUSCAR GESTO (comparar landmarks contra la base de datos)
// ============================================================
let gestosDB = null; // Cache de gestos

async function cargarGestos() {
  try {
    const res = await fetch(`${API_BASE}/admin/gestos`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    gestosDB = data.gestos;
    log(`Base de datos cargada: ${gestosDB.length} gestos`, 'ok');
  } catch (e) {
    log('Error cargando gestos: ' + e.message, 'error');
  }
}

function buscarGestoLocal(landmarks) {
  if (!gestosDB || !gestosDB.length) {
    log('Cargando gestos...', 'warn');
    cargarGestos();
    return;
  }

  // Calcular distancia euclidiana con cada gesto
  const resultados = gestosDB.map(g => {
    const vec = g.landmarks;
    if (!vec || vec.length !== 63) return { nombre: g.nombre, dist: 999 };

    let suma = 0;
    for (let i = 0; i < 63; i++) {
      const diff = (landmarks[i] || 0) - (vec[i] || 0);
      suma += diff * diff;
    }
    const dist = Math.sqrt(suma);
    return { nombre: g.nombre, tipo: g.tipo, dist };
  });

  // Ordenar por distancia (menor = más similar)
  resultados.sort((a, b) => a.dist - b.dist);

  const mejor = resultados[0];
  const umbral = 0.5; // Umbral de similitud

  // Convertir distancia a confianza (0-1)
  const confianza = Math.max(0, Math.min(1, 1 - (mejor.dist / umbral)));

  // Actualizar UI con el mejor candidato
  actualizarUI(mejor.nombre, confianza, resultados.slice(0, 3), umbral);
}

// ============================================================
// ACTUALIZAR UI
// ============================================================
function actualizarUI(nombre, confianza, top3, umbral) {
  const pct = Math.round(confianza * 100);

  // Letra grande
  document.getElementById('letra-display').textContent = nombre || '?';

  // Barra de confianza
  document.getElementById('conf-valor').textContent = pct + '%';
  const bar = document.getElementById('conf-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 70 ? '#22c55e' : pct > 40 ? '#f59e0b' : '#ef4444';

  // Agregar al historial si es nueva y confianza > 50%
  if (nombre !== ultimaLetra && confianza > 0.5) {
    ultimaLetra = nombre;
    historialArr.push(nombre);
    if (historialArr.length > 20) historialArr.shift();
    actualizarHistorial();
    log(`Detectado: "${nombre}" (${pct}% confianza)`, confianza > 0.7 ? 'ok' : 'warn');
  }

  // Top 3 candidatos
  const contenedor = document.getElementById('candidatos');
  contenedor.innerHTML = top3.map((c, i) => {
    const conf = Math.max(0, Math.min(100, Math.round((1 - c.dist / umbral) * 100)));
    const color = i === 0 ? '#4f8ef7' : i === 1 ? '#38d9a9' : '#738099';
    return `
      <div class="cand-item">
        <div class="cand-nombre" style="color:${color}">${c.nombre}</div>
        <div class="cand-bar-wrap">
          <div class="cand-bar" style="width:${Math.max(0,conf)}%; background:${color}"></div>
        </div>
        <div class="cand-pct">${Math.max(0,conf)}%</div>
        <div style="font-size:.72rem; color:#738099; min-width:32px">${c.tipo || ''}</div>
      </div>
    `;
  }).join('');
}

function limpiarDeteccion() {
  document.getElementById('letra-display').textContent = '—';
  document.getElementById('conf-valor').textContent = '0%';
  document.getElementById('conf-bar').style.width = '0%';
}

function actualizarHistorial() {
  document.getElementById('historial').innerHTML =
    historialArr.map(l => `<span class="hist-letra">${l}</span>`).join('');
}

function limpiarTodo() {
  historialArr = [];
  ultimaLetra  = '';
  actualizarHistorial();
  limpiarDeteccion();
  document.getElementById('palabra-display').textContent = '';
  document.getElementById('frase-display').textContent   = '';
  document.getElementById('candidatos').innerHTML =
    '<div style="color:#738099; font-size:.85rem">Sin detecciones</div>';
  log('Limpiado', 'warn');
}

// ============================================================
// INICIO
// ============================================================
if (!TOKEN) {
  log('⚠️ No hay sesión activa. Ve a localhost:8000, inicia sesión y vuelve aquí.', 'error');
  document.querySelector('.btn-blue').disabled = true;
} else {
  log('Token encontrado. Cargando base de datos de gestos...', 'ok');
  cargarGestos();
}
</script>
</body>
</html>
