<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🤟 Prueba de Reconocimiento de Señas</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="js/navbar.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      padding: 1.5rem;
      padding-top: calc(62px + 1.5rem);
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: 520px 1fr;
      gap: 1.5rem;
      max-width: 1100px;
    }

    /* Cámara */
    .camara-wrap {
      position: relative;
      background: #000;
      border-radius: var(--radius-md);
      overflow: hidden;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
    }
    #video  { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* Panel derecho */
    .panel { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: var(--bg-700);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
    }
    .card h3 {
      font-size: .78rem;
      color: var(--text-300);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .75rem;
      font-weight: 700;
    }

    /* Letra grande */
    .letra-display {
      font-size: 7rem;
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      text-align: center;
      min-height: 7rem;
    }
    .palabra-display {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent-2);
      text-align: center;
      margin-top: .5rem;
      min-height: 2rem;
    }
    .frase-display {
      font-size: 1rem;
      color: var(--text-200);
      text-align: center;
      margin-top: .4rem;
      min-height: 1.4rem;
      word-break: break-all;
    }

    /* Confianza */
    .conf-label {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      color: var(--text-300);
      margin-bottom: .4rem;
    }

    /* Top 3 candidatos */
    .candidatos { display: flex; flex-direction: column; gap: .4rem; }
    .cand-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .45rem .75rem;
      background: var(--bg-600);
      border-radius: var(--radius-sm);
    }
    .cand-nombre {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1rem;
      min-width: 40px;
      color: var(--accent);
    }
    .cand-bar-wrap {
      flex: 1;
      background: var(--bg-800);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .cand-bar {
      height: 100%;
      border-radius: 999px;
      background: var(--border-light);
      transition: width .2s ease;
    }
    .cand-pct {
      font-size: .78rem;
      color: var(--text-300);
      min-width: 38px;
      text-align: right;
    }

    /* Historial */
    .historial-letras {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
      min-height: 36px;
    }
    .hist-letra {
      background: var(--bg-600);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: .2rem .5rem;
      font-family: var(--font-mono);
      font-size: .85rem;
      color: var(--text-200);
      animation: popIn .15s ease;
    }
    @keyframes popIn {
      from { transform: scale(.5); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    /* Estado */
    .estado-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .75rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
      background: rgba(244,63,94,.12);
      color: var(--danger);
      border: 1px solid rgba(244,63,94,.25);
    }
    .estado-badge.activo {
      background: rgba(16,185,129,.12);
      color: var(--success);
      border-color: rgba(16,185,129,.25);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Log */
    #log {
      background: var(--bg-900);
      border-radius: var(--radius-sm);
      padding: .75rem;
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--text-300);
      height: 100px;
      overflow-y: auto;
    }
    .log-ok   { color: var(--success); }
    .log-warn { color: var(--warning); }
    .log-err  { color: var(--danger); }

    .mano-indicator {
      text-align: center;
      font-size: .82rem;
      color: var(--text-300);
      margin-top: .4rem;
    }
    .mano-indicator.detectada { color: var(--success); }
  </style>
</head>
<body>

<h1>🤟 Prueba de Reconocimiento — Señas V2</h1>

<div class="layout">

  <!-- CÁMARA -->
  <div>
    <div class="camara-wrap">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="mano-indicator" id="mano-indicator">Sin mano detectada</div>
    <div style="margin-top:.75rem; display:flex; align-items:center; gap:.75rem">
      <span class="estado-badge" id="estado-badge">
        <span class="dot"></span> Cámara apagada
      </span>
      <span id="fps-display" style="font-size:.78rem; color:var(--text-300)"></span>
    </div>
    <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.75rem">
      <button class="btn btn-primary btn-sm"  onclick="iniciarCamara()">📷 Iniciar cámara</button>
      <button class="btn btn-danger  btn-sm"  onclick="detenerCamara()">⏹ Detener</button>
      <button class="btn btn-ghost   btn-sm"  onclick="limpiarTodo()">🗑 Limpiar</button>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="panel">

    <div class="card">
      <h3>Gesto detectado</h3>
      <div class="letra-display"   id="letra-display">—</div>
      <div class="palabra-display" id="palabra-display"></div>
      <div class="frase-display"   id="frase-display"></div>
      <div style="margin-top:.75rem">
        <div class="conf-label">
          <span>Confianza</span>
          <span id="conf-valor">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="conf-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Top 3 candidatos</h3>
      <div class="candidatos" id="candidatos">
        <div style="color:var(--text-300); font-size:.85rem">Inicia la cámara para ver candidatos</div>
      </div>
    </div>

    <div class="card">
      <h3>Historial de detecciones (últimas 20)</h3>
      <div class="historial-letras" id="historial"></div>
    </div>

    <div class="card">
      <h3>Log del sistema</h3>
      <div id="log"></div>
    </div>

  </div>
</div>

<script>
const API_BASE = window.location.origin + '/api';
const TOKEN    = localStorage.getItem('token');

let stream         = null;
let frameTimer     = null;
let frameCount     = 0;
let ultimaLetra    = '';
let historialArr   = [];
let fpsTimer       = null;
let framesEnviados = 0;

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function log(msg, tipo = 'info') {
  const el  = document.getElementById('log');
  const cls = tipo === 'ok' ? 'log-ok' : tipo === 'error' ? 'log-err' : tipo === 'warn' ? 'log-warn' : '';
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

async function iniciarCamara() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    canvas.width  = 640;
    canvas.height = 480;

    const badge = document.getElementById('estado-badge');
    badge.innerHTML = '<span class="dot"></span> Cámara activa';
    badge.classList.add('activo');

    log('Cámara iniciada correctamente', 'ok');
    frameTimer = setInterval(capturarYEnviar, 1000 / 15);
    fpsTimer = setInterval(() => {
      document.getElementById('fps-display').textContent = `${framesEnviados} fps`;
      framesEnviados = 0;
    }, 1000);
  } catch (e) {
    log('Error de cámara: ' + e.message, 'error');
    alert('No se pudo acceder a la cámara: ' + e.message);
  }
}

function detenerCamara() {
  clearInterval(frameTimer);
  clearInterval(fpsTimer);
  stream?.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  const badge = document.getElementById('estado-badge');
  badge.innerHTML = '<span class="dot"></span> Cámara apagada';
  badge.classList.remove('activo');
  log('Cámara detenida', 'warn');
}

async function capturarYEnviar() {
  if (!video.videoWidth) return;
  frameCount++;
  framesEnviados++;
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -640, 0, 640, 480);
  ctx.restore();
  const b64 = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];

  if (TOKEN) {
    try {
      const res = await fetch(`${API_BASE}/admin/extraer-landmarks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${TOKEN}`
        },
        body: JSON.stringify({ frame_b64: b64 })
      });
      const data = await res.json();
      if (data.landmarks) {
        document.getElementById('mano-indicator').textContent = '✋ Mano detectada';
        document.getElementById('mano-indicator').className = 'mano-indicator detectada';
        buscarGestoLocal(data.landmarks);
      } else {
        document.getElementById('mano-indicator').textContent = 'Sin mano detectada';
        document.getElementById('mano-indicator').className = 'mano-indicator';
        limpiarDeteccion();
      }
    } catch (e) { log('Error al enviar frame: ' + e.message, 'error'); }
  } else {
    log('No hay token. Inicia sesión primero en localhost:8000', 'warn');
    clearInterval(frameTimer);
  }
}

let gestosDB = null;

async function cargarGestos() {
  try {
    const res = await fetch(`${API_BASE}/admin/gestos`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    gestosDB = data.gestos;
    log(`Base de datos cargada: ${gestosDB.length} gestos`, 'ok');
  } catch (e) { log('Error cargando gestos: ' + e.message, 'error'); }
}

function buscarGestoLocal(landmarks) {
  if (!gestosDB || !gestosDB.length) {
    log('Cargando gestos...', 'warn');
    cargarGestos();
    return;
  }
  const resultados = gestosDB.map(g => {
    const vec = g.landmarks;
    if (!vec || vec.length !== 63) return { nombre: g.nombre, dist: 999 };
    let suma = 0;
    for (let i = 0; i < 63; i++) {
      const diff = (landmarks[i] || 0) - (vec[i] || 0);
      suma += diff * diff;
    }
    return { nombre: g.nombre, tipo: g.tipo, dist: Math.sqrt(suma) };
  });
  resultados.sort((a, b) => a.dist - b.dist);
  const mejor = resultados[0];
  const umbral = 0.5;
  const confianza = Math.max(0, Math.min(1, 1 - (mejor.dist / umbral)));
  actualizarUI(mejor.nombre, confianza, resultados.slice(0, 3), umbral);
}

function actualizarUI(nombre, confianza, top3, umbral) {
  const pct = Math.round(confianza * 100);
  document.getElementById('letra-display').textContent = nombre || '?';
  document.getElementById('conf-valor').textContent = pct + '%';
  const bar = document.getElementById('conf-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 70 ? 'var(--success)' : pct > 40 ? 'var(--warning)' : 'var(--danger)';

  if (nombre !== ultimaLetra && confianza > 0.5) {
    ultimaLetra = nombre;
    historialArr.push(nombre);
    if (historialArr.length > 20) historialArr.shift();
    actualizarHistorial();
    log(`Detectado: "${nombre}" (${pct}% confianza)`, confianza > 0.7 ? 'ok' : 'warn');
  }

  const contenedor = document.getElementById('candidatos');
  contenedor.innerHTML = top3.map((c, i) => {
    const conf  = Math.max(0, Math.min(100, Math.round((1 - c.dist / umbral) * 100)));
    const color = i === 0 ? 'var(--accent)' : i === 1 ? 'var(--accent-2)' : 'var(--text-300)';
    return `
      <div class="cand-item">
        <div class="cand-nombre" style="color:${color}">${c.nombre}</div>
        <div class="cand-bar-wrap">
          <div class="cand-bar" style="width:${Math.max(0,conf)}%; background:${color}"></div>
        </div>
        <div class="cand-pct">${Math.max(0,conf)}%</div>
        <div style="font-size:.72rem; color:var(--text-300); min-width:32px">${c.tipo || ''}</div>
      </div>`;
  }).join('');
}

function limpiarDeteccion() {
  document.getElementById('letra-display').textContent = '—';
  document.getElementById('conf-valor').textContent    = '0%';
  document.getElementById('conf-bar').style.width      = '0%';
}

function actualizarHistorial() {
  document.getElementById('historial').innerHTML =
    historialArr.map(l => `<span class="hist-letra">${l}</span>`).join('');
}

function limpiarTodo() {
  historialArr = []; ultimaLetra = '';
  actualizarHistorial();
  limpiarDeteccion();
  document.getElementById('palabra-display').textContent = '';
  document.getElementById('frase-display').textContent   = '';
  document.getElementById('candidatos').innerHTML =
    '<div style="color:var(--text-300); font-size:.85rem">Sin detecciones</div>';
  log('Limpiado', 'warn');
}

if (!TOKEN) {
  log('⚠️ No hay sesión activa. Ve a localhost:8000, inicia sesión y vuelve aquí.', 'error');
  document.querySelector('.btn-primary').disabled = true;
} else {
  log('Token encontrado. Cargando base de datos de gestos...', 'ok');
  cargarGestos();
}
</script>
</body>
</html>
