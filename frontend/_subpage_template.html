<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- NOMBRE DE LA SECCIÓN --></title>
  <!--
    RUTA DE ASSETS: las sub-páginas viven en admin_pages/
    Por eso los paths suben un nivel con ../
  -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /*
      Estilos propios de esta sub-página.
      NO necesitan navbar ni sidebar: los hereda del admin.html padre.
    */
    body {
      background: var(--bg-900);
      color: var(--text-100);
      min-height: 100vh;
      padding: 1.75rem 2rem;
      overflow-y: auto;
    }
  </style>
</head>

<!--
  data-theme-only → le dice a navbar.js que esta página vive en un
  iframe y NO debe renderizar el navbar. Solo aplica el tema guardado
  y escucha cambios en tiempo real. El <script src="../js/navbar.js">
  de abajo hace TODO el trabajo — no hay código extra aquí.
-->
<body data-theme-only>

  <!-- CONTENIDO DE LA SECCIÓN AQUÍ -->
  <h2 style="margin-bottom:1.5rem">🏷️ Título de la sección</h2>

  <p class="text-muted">Contenido...</p>

<!-- navbar.js: modo solo-tema por data-theme-only en <body> -->
<script src="../js/navbar.js"></script>
<script src="../js/app.js"></script>
<script>
  /*
    ─────────────────────────────────────────────────────────
    NOTAS PARA SUB-PÁGINAS
    ─────────────────────────────────────────────────────────
    ✗ NO llamar Auth.requerir() — el padre (admin.html) ya lo hizo.

    ✓ Para navegar a otra sección desde este iframe:
        window.parent.adminNavegar('estadisticas')

    ✓ Para acceder a la API (el token lo gestiona app.js):
        Api.get('/admin/algo')
        Api.post('/admin/gestos', { ... })

    ✓ Para mostrar notificaciones:
        toast('Mensaje', 'success' | 'error' | 'info')
    ─────────────────────────────────────────────────────────
  */
</script>
</body>
</html>
